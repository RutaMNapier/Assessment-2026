name: Build & Test Workflow

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore database project
        run: dotnet restore RentalApp.Database/RentalApp.Database.csproj

      - name: Restore migrations project
        run: dotnet restore RentalApp.Migrations/RentalApp.Migrations.csproj

      - name: Restore test project
        run: dotnet restore RentalApp.Test/RentalApp.Test.csproj

      - name: Build database project
        env:
          ConnectionStrings__DevelopmentConnection: Host=localhost;Port=5432;Username=test_user;Password=test_password;Database=testdb;
        run: dotnet build RentalApp.Database/RentalApp.Database.csproj -c Debug --no-restore

      - name: Build migrations project
        env:
          ConnectionStrings__DevelopmentConnection: Host=localhost;Port=5432;Username=test_user;Password=test_password;Database=testdb;
        run: dotnet build RentalApp.Migrations/RentalApp.Migrations.csproj -c Debug --no-restore

      - name: Run tests
        env:
          ConnectionStrings__DevelopmentConnection: Host=localhost;Port=5432;Username=test_user;Password=test_password;Database=testdb;
        run: dotnet test RentalApp.Test/RentalApp.Test.csproj -c Debug